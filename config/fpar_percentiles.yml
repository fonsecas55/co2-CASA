# Per-class NDVI/SR bounds for FPAR rescaling (Xu 2023, eq. 3-6).
#
# PLACEHOLDER VALUES — TODO: calibrate as the 5th/95th percentiles over a large
# historical Sentinel-2 sample per class (NOT per image). Current values are a
# generic NDVI 0.05/0.95 with SR derived via SR=(1+NDVI)/(1-NDVI), uniform
# across vegetation classes so the pipeline runs end-to-end before calibration.
# non_vegetation omitted -> 0/0 (degenerate span -> FPAR_MIN, masked downstream).
trees:              {ndvi_min: 0.05, ndvi_max: 0.95, sr_min: 1.105, sr_max: 39.0}
shrub_and_scrub:    {ndvi_min: 0.05, ndvi_max: 0.95, sr_min: 1.105, sr_max: 39.0}
grass:              {ndvi_min: 0.05, ndvi_max: 0.95, sr_min: 1.105, sr_max: 39.0}
crops:              {ndvi_min: 0.05, ndvi_max: 0.95, sr_min: 1.105, sr_max: 39.0}
flooded_vegetation: {ndvi_min: 0.05, ndvi_max: 0.95, sr_min: 1.105, sr_max: 39.0}
